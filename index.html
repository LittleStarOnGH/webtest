<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Device Hologram System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="bg-black text-white justify-center items-center font-sans overflow-hidden m-0 h-screen w-screen selection:bg-transparent">

    <div id="mode-selection" class="absolute inset-0 z-50 flex flex-col justify-center items-center bg-slate-950 p-6 text-center">
        <h1 class="text-2xl font-bold mb-2 text-indigo-400">✨ Hologram System Setup</h1>
        <p class="text-xs text-slate-400 mb-8 max-w-xs">กรุณาเลือกโหมดการทำงานสำหรับอุปกรณ์เครื่องนี้</p>
        <div class="flex flex-col gap-4 w-full max-w-xs">
            <button onclick="startAs('screen')" class="bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95 text-sm">
                📺 เปิดเป็นหน้าจอแสดงผล (สำหรับ iPad)
            </button>
            <button onclick="startAs('controller')" class="bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95 text-sm">
                📱 เปิดเป็นรีโมตควบคุม (สำหรับโทรศัพท์มือถือ)
            </button>
        </div>
    </div>

    <div id="screen-view" class="hidden w-full h-full">
        <div id="canvas-container"></div>
    </div>

    <div id="controllerview" class="hidden w-full h-full p-6 flex flex-col justify-between overflow-y-auto">
        <div>
            <div class="text-center mb-4">
                <span class="text-2xl">🎮</span>
                <h2 class="text-lg font-bold text-indigo-400">Hologram Remote</h2>
                <p class="text-[10px] text-slate-500">ควบคุมวัตถุบนหน้าจอ iPad ของคุณ</p>
            </div>

            <div class="mb-5 bg-slate-900/60 p-4 rounded-2xl border border-slate-800">
                <label class="block text-xs font-semibold text-slate-400 mb-2">เปลี่ยนรูปทรงวัตถุ</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="sendAction('shape', 'torus')" class="bg-indigo-600 py-2 rounded-xl text-xs font-medium">วงแหวนปม</button>
                    <button onclick="sendAction('shape', 'crystal')" class="bg-slate-800 py-2 rounded-xl text-xs font-medium">คริสตัล</button>
                    <button onclick="sendAction('shape', 'cone')" class="bg-slate-800 py-2 rounded-xl text-xs font-medium">ทรงกรวย</button>
                </div>
            </div>

            <div class="mb-5 bg-slate-900/60 p-4 rounded-2xl border border-slate-800">
                <label class="block text-xs font-semibold text-slate-400 mb-2">เปลี่ยนสีนีออน</label>
                <div class="flex gap-4 justify-around">
                    <button onclick="sendAction('color', '#ffd700')" class="w-8 h-8 rounded-full bg-[#ffd700] border-2 border-white/20 active:scale-90 transition-all"></button>
                    <button onclick="sendAction('color', '#00ffcc')" class="w-8 h-8 rounded-full bg-[#00ffcc] border-2 border-white/20 active:scale-90 transition-all"></button>
                    <button onclick="sendAction('color', '#ff007f')" class="w-8 h-8 rounded-full bg-[#ff007f] border-2 border-white/20 active:scale-90 transition-all"></button>
                    <button onclick="sendAction('color', '#39ff14')" class="w-8 h-8 rounded-full bg-[#39ff14] border-2 border-white/20 active:scale-90 transition-all"></button>
                </div>
            </div>

            <div id="touchpad" class="w-full h-44 bg-slate-950 rounded-2xl border-2 border-dashed border-slate-800 flex flex-col justify-center items-center text-center p-4 active:border-indigo-500 transition-all touch-none">
                <span class="text-xl mb-1">🎯</span>
                <span class="text-xs font-medium text-slate-400">Virtual Touchpad</span>
                <span class="text-[10px] text-slate-600 mt-1">ใช้นิ้วลากตรงนี้เพื่อหมุนวัตถุบนหน้าจอ iPad</span>
            </div>
        </div>
        <p class="text-[9px] text-center text-slate-600 mt-4">Connected via Local Python Network</p>
    </div>

    <script>
        let scene, camera, renderer, currentMesh;
        let isScreen = false;

        // ใช้ BroadcastChannel สำหรับผูกเบราว์เซอร์ในเครือข่ายจำลอง
        const channel = new BroadcastChannel('hologram_core_sync');

        function startAs(mode) {
            document.getElementById('mode-selection').classList.add('hidden');
            if (mode === 'screen') {
                isScreen = true;
                document.getElementById('screen-view').classList.remove('hidden');
                init3D();
            } else {
                document.getElementById('controllerview').classList.remove('hidden');
                setupTouchpad();
            }
        }

        // ฝั่งมือถือ: ส่งข้อมูลการควบคุม
        function sendAction(type, value) {
            channel.postMessage({ type: type, value: value });
        }

        // ฝั่ง iPad: รับข้อมูลมาแสดงผลในแบบ 3D
        channel.onmessage = function (e) {
            if (!isScreen) return;
            const data = e.data;
            if (data.type === 'shape') {
                createGeometry(data.value, currentMesh.material.color.getHexString());
            } else if (data.type === 'color') {
                currentMesh.material.color.set(data.value);
            } else if (data.type === 'rotate') {
                if (currentMesh) {
                    currentMesh.rotation.y += data.deltaX * 0.01;
                    currentMesh.rotation.x += data.deltaY * 0.01;
                }
            }
        };

        // เริ่มตั้งค่าระบบกราฟิก 3D (Three.js)
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000); // บังคับพื้นหลังดำสนิทป้องกันแสงกวน

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 7;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            createGeometry('torus', 'ffd700');
            animate();
        }

        function createGeometry(type, colorHex) {
            if (currentMesh) scene.remove(currentMesh);
            let geometry;
            if (type === 'torus') geometry = new THREE.TorusKnotGeometry(1, 0.35, 100, 16);
            else if (type === 'crystal') geometry = new THREE.IcosahedronGeometry(1.4, 0);
            else if (type === 'cone') geometry = new THREE.ConeGeometry(1.1, 2.2, 32);

            const material = new THREE.MeshStandardMaterial({
                color: new THREE.Color("#" + colorHex.replace("#", "")),
                metalness: 0.8,
                roughness: 0.2,
                flatShading: type === 'crystal'
            });
            currentMesh = new THREE.Mesh(geometry, material);
            scene.add(currentMesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (currentMesh) {
                currentMesh.rotation.y += 0.003; // หมุนเอื่อยๆ ตอนสแตนด์บาย
            }
            renderer.render(scene, camera);
        }

        // ระบบจับพิกัดการลากนิ้วบนหน้าจอมือถือ
        function setupTouchpad() {
            const pad = document.getElementById('touchpad');
            let isDrawing = false;
            let lastX = 0, lastY = 0;

            pad.addEventListener('touchstart', e => {
                isDrawing = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            });

            pad.addEventListener('touchmove', e => {
                if (!isDrawing) return;
                const x = e.touches[0].clientX;
                const y = e.touches[0].clientY;
                const deltaX = x - lastX;
                const deltaY = y - lastY;

                sendAction('rotate', { deltaX: deltaX, deltaY: deltaY });

                lastX = x;
                lastY = y;
            });

            pad.addEventListener('touchend', () => isDrawing = false);
        }

        window.addEventListener('resize', () => {
            if (!isScreen) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
